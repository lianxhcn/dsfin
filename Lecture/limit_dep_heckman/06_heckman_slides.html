<p>研究问题：企业特征如何影响银行贷款利率？</p>
<div class="formula">
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mi>r</mi><mi>a</mi><mi>t</mi><msub><mi>e</mi><mi>i</mi></msub><mo>=</mo><msubsup><mi>x</mi><mi>i</mi><mo mathvariant="normal" lspace="0em" rspace="0em">′</mo></msubsup><mi>β</mi><mo>+</mo><msub><mi>u</mi><mi>i</mi></msub></mrow><annotation encoding="application/x-tex">rate_i = x_i&#x27;\beta + u_i
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.7651em;vertical-align:-0.15em;"></span><span class="mord mathnormal" style="margin-right:0.02778em;">r</span><span class="mord mathnormal">a</span><span class="mord mathnormal">t</span><span class="mord"><span class="mord mathnormal">e</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1.0489em;vertical-align:-0.247em;"></span><span class="mord"><span class="mord mathnormal">x</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.8019em;"><span style="top:-2.453em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span><span style="top:-3.113em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mtight">′</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.247em;"><span></span></span></span></span></span></span><span class="mord mathnormal" style="margin-right:0.05278em;">β</span><span class="mspace" style="m <h2 id="%E4%B8%80%E4%B8%AA%E4%B8%A4%E9%98%B6%E6%AE%B5%E7%9A%84%E7%BB%8F%E6%B5%8E%E8%BF%87%E7%A8%8B">一个两阶段的经济过程</h2>
<p>银行贷款利率样本通常经历两个过程：</p>
<ul>
<li><strong>选择过程</strong>：银行先决定是否发放贷款，企业是否进入贷款利率样本</li>
<li><strong>结果过程</strong>：在获得贷款企业中，银行与企业形成贷款利率</li>
</ul>
<div class="formula">
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mtext>firm characteristics</mtext><mo>→</mo><mi>l</mi><mi>o</mi><mi>a</mi><msub><mi>n</mi><mi>i</mi></msub><mo>→</mo><mi>r</mi><mi>a</mi><mi>t</mi><msub><mi>e</mi><mi>i</mi></msub></mrow><annotation encoding="application/x-tex">\text{firm characteristics} \rightarrow loan_i \rightarrow rate_i
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6944em;"></span><span class="mord text"><span class="mord">firm characteristics</span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">→</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.8444em;vertical-align:-0.15em;"></span><span class="mord mathnormal" style="margin-right:0.01968em;">l</span><span class="mord mathnormal">o</span><span class="mord mathnormal">a</span><span class="mord"><span class="mord mathnormal">n</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">→</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.7651em;vertical-align:-0.15em;"></span><span class="mord mathnormal" style="margin-right:0.02778em;">r</span><span class="mord mathnormal">a</span><span class="mord mathnormal">t</span><span class="mord"><span class="mord mathnormal">e</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span></span></p></div>
<p>若获得贷款不是随机事件，只在获得贷款企业中做 OLS，本质上是在一个经过筛选的样本中估计结果方程。</p>

<h2 id="heckman-%E4%B8%8E-tobit-%E7%9A%84%E5%8C%BA%E5%88%AB">Heckman 与 Tobit 的区别</h2>
<div class="note">
Tobit 模型中，未超过阈值的结果通常仍以边界值形式进入数据，例如 $y_i=0$。Heckman 选择模型中，未被选择样本的结果变量并不是 0，而是根本不可观测。
</div>
<p>贷款案例中，没有获得贷款的企业不是贷款利率为 0，而是没有可观测贷款利率。</p>

<h2 id="%E4%BB%8E%E6%94%BF%E7%AD%96%E8%83%8C%E6%99%AF%E7%90%86%E8%A7%A3-selection-%E6%96%B9%E7%A8%8B">从政策背景理解 selection 方程</h2>
<p>银行贷款不是简单的市场交易结果，而是带有信息筛选、风险评估和制度约束的审批过程。</p>
<p>贷款利率样本可能来自以下筛选机制：</p>
<ul>
<li>企业是否提出融资申请</li>
<li>银行是否愿意进入授信审查流程</li>
<li>企业是否拥有抵押品或担保</li>
<li>所在地区是否有银行网点或政银企对接窗口</li>
<li>企业是否披露贷款合同或利息支出明细</li>
</ul>

<h2 id="%E6%8E%92%E4%BB%96%E6%80%A7%E5%8F%98%E9%87%8F%E6%9D%A5%E8%87%AA%E6%A0%B7%E6%9C%AC%E4%BA%A7%E7%94%9F%E8%BF%87%E7%A8%8B">排他性变量来自样本产生过程</h2>
<p>本地银行网点密度、园区金融服务站、政银企对接平台、信用担保服务覆盖等变量，可能显著影响企业是否获得贷款。</p>
<p>若这些变量主要影响“能否获得贷款”，但在控制企业风险和财务特征后不直接决定贷款合同利率，就可以作为选择方程中的排他性变量候选。</p>
<div class="important">
排他性变量不能事后硬凑。它应来自样本选择过程本身。
</div>

<h2 id="%E4%BB%8E%E5%9B%A0%E6%9E%9C%E6%8E%A8%E6%96%AD%E8%A7%92%E5%BA%A6%E7%90%86%E8%A7%A3-heckman">从因果推断角度理解 Heckman</h2>
<p>普通 OLS 试图识别：</p>
<div class="formula">
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mi>E</mi><mo stretchy="false">(</mo><msub><mi>y</mi><mi>i</mi></msub><mo>∣</mo><msub><mi>x</mi><mi>i</mi></msub><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">E(y_i\mid x_i)
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.05764em;">E</span><span class="mopen">(</span><span class="mord"><span class="mord mathnormal" style="margin-right:0.03588em;">y</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:-0.0359em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">∣</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord mathnormal">x</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mclose">)</span></span></span></span></span></p></div>

</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.05764em;">E</span><span class="mopen">(</span><span class="mord"><span class="mord mathnormal" style="margin-right:0.03588em;">y</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:-0.0359em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">∣</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.625em;vertical-align:-0.1944em;"></span><span class="mord"><span class="mord mathnormal">x</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord"><span class="mord mathnormal">s</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class=" <p>其中，<span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>s</mi><mi>i</mi></msub><mo>=</mo><mn>1</mn></mrow><annotation encoding="application/x-tex">s_i=1</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.5806em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">s</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.6444em;"></span><span class="mord">1</span></span></span></span> 表示结果变量被观测到。</p>

<h2 id="%E9%80%89%E6%8B%A9%E5%AF%BC%E8%87%B4%E7%9A%84%E9%81%97%E6%BC%8F%E5%8F%98%E9%87%8F%E5%81%8F%E8%AF%AF">选择导致的遗漏变量偏误</h2>
<p>如果进入样本本身与结果方程的未观测因素相关：</p>
<div class="formula">
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mi>s</mi><mi>i</mi></msub><mo>⊥̸</mo><msub><mi>u</mi><mi>i</mi></msub><mo>∣</mo><msub><mi>x</mi><mi>i</mi></msub></mrow><annotation encoding="application/x-tex">s_i \not\perp u_i \mid x_i

<h2 id="inverse-mills-ratio-%E7%9A%84%E6%9D%A5%E6%BA%90">inverse Mills ratio 的来源</h2>

<div class="formula">
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mi>y</mi><mi>i</mi></msub><mo>=</mo><msubsup><mi>x</mi><mi>i</mi><mo mathvariant="normal" lspace="0em" rspace="0em">′</mo></msubsup><mi>β</mi><mo>+</mo><msub><mi>u</mi><mi>i</mi></msub><mo separator="true">,</mo><mspace width="1em"/><msub><mi>s</mi><mi>i</mi></msub><mo>=</mo><mn>1</mn></mrow><annotation encoding="application/x-tex">y_i = x_i&#x27;\beta + u_i, \quad s_i=1

<h2 id="imr-%E4%BF%AE%E6%AD%A3%E9%A1%B9">IMR 修正项</h2>
<p>在联合正态假设下：</p>
<div class="formula">

<h2 id="heckman-%E4%B8%A4%E6%AD%A5%E6%B3%95">Heckman 两步法</h2>
<ol>
<li><strong>第一步</strong>：估计选择方程 Probit</li>
</ol>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># 第一阶段：Probit 选择方程</span>

]])

<span class="hljs-comment"># 计算 inverse Mills ratio</span>

df[<span class="hljs-string">&quot;imr&quot;</span>] = norm.pdf(xb) / norm.cdf(xb)

<span class="hljs-comment"># 第二阶段：仅在被选择样本中估计结果方程</span>

X = sm.add_constant(df_s[[
    <span class="hljs-string">&quot;size&quot;</span>, <span class="hljs-string">&quot;cash&quot;</span>, <span class="hljs-string">&quot;lev&quot;</span>, <span class="hljs-string">&quot;profit&quot;</span>, <span class="hljs-string">&quot;collateral&quot;</span>, <span class="hljs-string">&quot;imr&quot;</span>
]])

<h2 id="%E5%AE%9E%E8%AF%81%E8%A7%A3%E9%87%8A%E7%9A%84%E5%86%99%E4%BD%9C%E9%A1%BA%E5%BA%8F">实证解释的写作顺序</h2>
<ul>
<li>第一阶段 Probit：哪些因素影响企业进入贷款利率样本</li>
<li>排他性变量：是否显著影响贷款可得性</li>
<li>第二阶段结果方程：企业特征如何影响贷款利率</li>
<li>IMR 系数：选择修正项是否重要</li>
<li>OLS 与 Heckman 对比：选择修正是否改变核心结论</li>
</ul>
<div class="note">
第一阶段不是附属回归，而是在刻画样本如何产生。
</div>

<h2 id="%E4%B8%8E%E5%85%B6%E4%BB%96%E5%8F%97%E9%99%90%E5%9B%A0%E5%8F%98%E9%87%8F%E6%A8%A1%E5%9E%8B%E7%9A%84%E5%8C%BA%E5%88%AB">与其他受限因变量模型的区别</h2>
<table>
<thead>
<tr>
<th>模型</th>
<th>观测机制</th>
<th>典型问题</th>
<th>关键设定</th>
</tr>
</thead>
<tbody>
<tr>
<td>Tobit</td>
<td>潜在结果被删失，边界值仍可观测</td>
<td>研发投入大量为 0</td>
<td>一个潜在结果方程</td>
</tr>
<tr>
<td>Truncated regression</td>
<td>某些样本根本不进入数据</td>
<td>只观察高收入样本</td>
<td>截断后的结果方程</td>
</tr>
<tr>
<td>Two-part model</td>
<td>是否参与和正值强度分开</td>
<td>是否捐赠与捐赠金额</td>
<td>参与方程 + 正值方程</td>
</tr>
<tr>
<td>Heckman selection</td>
<td>结果变量只在被选择样本中可观测</td>
<td>只有获得贷款企业有贷款利率</td>
<td>选择方程 + 结果方程</td>
</tr>
</tbody>
</table>

<h2 id="heckman-%E4%B8%8D%E6%98%AF-tobit-%E7%9A%84%E6%9B%BF%E4%BB%A3%E5%93%81">Heckman 不是 Tobit 的替代品</h2>
<div class="important">
如果未选择样本的结果变量被记录为 0，问题可能更接近 Tobit 或 Two-part model；如果未选择样本的结果变量根本不可观测，问题才更接近 Heckman selection model。
</div>
<p>关键不是数据中有没有 0，而是结果变量的观测机制。</p>

<h2 id="%E6%9C%AC%E7%AB%A0%E5%B0%8F%E7%BB%93">本章小结</h2>
<ul>
<li>Heckman 模型处理的是结果变量只在被选择样本中可观测的问题</li>
<li>selection 方程应来自样本产生机制，而不是机械加变量</li>
<li>outcome 方程解释的是进入样本后的结果形成机制</li>
<li>IMR 将选择过程中的非随机成分带入结果方程</li>
<li>排他性变量的合理性决定模型说服力</li>
</ul>
