name: dsfin_py311
# ============================================================
#  dsfin 课程虚拟环境 —— Python 3.11 版
#  支持：纯 Python 章节 + nbstata (Stata 内核)
#  兼容：Windows / macOS (Intel & Apple Silicon)
#  创建命令：conda env create -f env_dsfin_py311.yml
#  激活命令：conda activate dsfin_py311
# ============================================================

channels:
  - conda-forge      # 优先级最高，包最全、最新
  - defaults

dependencies:
  # ── Python 版本 ──────────────────────────────────────────
  - python=3.11

  # ── Jupyter 核心 ─────────────────────────────────────────
  - jupyterlab>=4.0        # 现代 Jupyter Lab 界面
  - notebook>=7.0          # 经典 Notebook 界面（nbstata 需要）
  - ipykernel              # Python 内核
  - ipywidgets             # 交互组件（进度条等）
  - nbformat               # Notebook 格式支持

  # ── 数据处理核心 ─────────────────────────────────────────
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - pyarrow                # Parquet / Arrow 格式支持

  # ── 数据可视化 ───────────────────────────────────────────
  - matplotlib>=3.7
  - seaborn>=0.13
  - plotly>=5.18           # 交互式图表

  # ── 统计建模 ─────────────────────────────────────────────
  - statsmodels>=0.14      # 回归、时序分析
  - scikit-learn>=1.3      # 机器学习（TF-IDF 等）

  # ── 金融数据获取 ─────────────────────────────────────────
  - requests>=2.31         # HTTP 请求
  - httpx                  # 异步 HTTP（akshare 依赖）
  - lxml                   # XML/HTML 解析
  - openpyxl               # 读写 Excel

  # ── 网络爬虫 ─────────────────────────────────────────────
  - beautifulsoup4>=4.12   # HTML 解析
  - selenium               # 浏览器自动化（动态页面爬取）

  # ── 文本分析 ─────────────────────────────────────────────
  - nltk>=3.8              # 英文 NLP 基础
  - wordcloud              # 词云图

  # ── 工具类 ───────────────────────────────────────────────
  - tqdm                   # 进度条
  - python-dotenv          # 管理 API Key（.env 文件）
  - pyyaml                 # YAML 配置文件读写
  - tabulate               # 表格美化输出

  # ── pip 安装的包（conda 源没有或版本更新）───────────────
  - pip
  - pip:
    # 金融数据 API
    - akshare>=1.14        # A 股、期货、宏观数据
    - wbgapi               # 世界银行 API
    # 中文 NLP
    - jieba>=0.42          # 中文分词
    # 结果展示
    - stargazer            # 回归结果表格（论文格式）
    - great-tables         # 美观数据表格
    # Stata 内核（Python 3.11 及以下）
    - nbstata>=0.8         # Jupyter 中运行 Stata 代码
